<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>俄罗斯方块</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="mainContainer">
        <h1>俄罗斯方块</h1>

        <!-- 难度选择界面 -->
        <div class="difficulty-modal" id="difficultyModal">
            <div class="modal-content">
                <h2>选择难度</h2>
                <div class="difficulty-options">
                    <button class="difficulty-btn" data-difficulty="easy">
                        <span class="difficulty-name">简单</span>
                        <span class="difficulty-desc">速度: 1000ms | 网格: 10x20</span>
                    </button>
                    <button class="difficulty-btn" data-difficulty="normal">
                        <span class="difficulty-name">普通</span>
                        <span class="difficulty-desc">速度: 800ms | 网格: 10x20</span>
                    </button>
                    <button class="difficulty-btn" data-difficulty="hard">
                        <span class="difficulty-name">困难</span>
                        <span class="difficulty-desc">速度: 500ms | 网格: 12x24</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 游戏结算界面 -->
        <div class="game-over-modal" id="gameOverModal">
            <div class="modal-content slide-in">
                <h2>游戏结束</h2>
                <div class="score-display">
                    <div class="score-item">
                        <span class="score-label">本次得分</span>
                        <span class="score-value" id="finalScore">0</span>
                    </div>
                    <div class="score-item">
                        <span class="score-label">最高分</span>
                        <span class="score-value best" id="bestScore">0</span>
                    </div>
                    <div class="score-item">
                        <span class="score-label">消除行数</span>
                        <span class="score-value" id="finalLines">0</span>
                    </div>
                </div>
                <div class="modal-buttons">
                    <button class="modal-btn primary" id="playAgainBtn">再来一局</button>
                    <button class="modal-btn secondary" id="replayBtn">回放</button>
                    <button class="modal-btn secondary" id="viewRankingBtn">排行榜</button>
                </div>
            </div>
        </div>

        <!-- 排行榜界面 -->
        <div class="ranking-modal" id="rankingModal">
            <div class="modal-content slide-in">
                <h2>排行榜</h2>
                <div class="ranking-list" id="rankingList">
                    <div class="ranking-item header">
                        <span>排名</span>
                        <span>分数</span>
                        <span>时间</span>
                    </div>
                </div>
                <button class="modal-btn primary" id="closeRankingBtn">关闭</button>
            </div>
        </div>

        <!-- 暂停界面 -->
        <div class="pause-overlay" id="pauseOverlay">
            <div class="pause-content">
                <h2>游戏暂停</h2>
                <p>按 P 或点击继续按钮</p>
                <button class="modal-btn primary" id="continueBtn">继续游戏</button>
            </div>
        </div>

        <!-- 回放界面 -->
        <div class="replay-overlay" id="replayOverlay">
            <div class="replay-content">
                <h2>回放中</h2>
                <div class="replay-progress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="replayProgress"></div>
                    </div>
                    <span id="replayStatus">0%</span>
                </div>
                <div class="replay-controls">
                    <button class="modal-btn secondary" id="replayPauseBtn">暂停</button>
                    <button class="modal-btn secondary" id="replaySpeedBtn">速度: 1x</button>
                    <button class="modal-btn secondary" id="replayStopBtn">停止</button>
                </div>
            </div>
        </div>

        <div class="game-wrapper">
            <div class="game-area">
                <canvas id="gameCanvas"></canvas>
                <div class="info-panel">
                    <div class="next-block">
                        <h3>下一个</h3>
                        <canvas id="nextCanvas"></canvas>
                    </div>
                    <div class="score-section">
                        <h3>分数</h3>
                        <p id="score">0</p>
                    </div>
                    <div class="score-section">
                        <h3>最高分</h3>
                        <p id="highScore">0</p>
                    </div>
                    <div class="score-section">
                        <h3>消除行数</h3>
                        <p id="lines">0</p>
                    </div>
                    <div class="score-section">
                        <h3>等级</h3>
                        <p id="level">1</p>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button id="startBtn">开始游戏</button>
                <button id="pauseBtn">暂停</button>
                <button id="resetBtn">重新开始</button>
                <button id="muteBtn">🔊 音效</button>
                <button id="themeBtn">🎨 主题</button>
                <button id="rankingBtn">🏆 排行榜</button>
            </div>

            <div class="instructions">
                <h3>操作说明</h3>
                <ul>
                    <li>← → 左右移动</li>
                    <li>↑ 旋转</li>
                    <li>↓ 加速下落</li>
                    <li>空格 直接落下</li>
                    <li>P 暂停/继续</li>
                </ul>
                <div class="touch-hint">
                    <h4>触屏操作</h4>
                    <p>左滑/右滑移动 | 上滑旋转 | 下滑加速</p>
                </div>
            </div>
        </div>

        <!-- 得分飘字容器 -->
        <div class="score-popup-container" id="scorePopupContainer"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
